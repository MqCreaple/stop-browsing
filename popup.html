<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>YouTube 时间监控</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 240px;
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      font-size: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-icon {
      font-size: 28px;
      line-height: 1;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .stat-label {
      color: #aaa;
    }

    .stat-value {
      font-weight: 600;
      color: #fff;
    }

    .stat-value.over-limit {
      color: #ff4444;
    }

    .stat-value.night {
      color: #ffaa44;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 0 4px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #4ecdc4, #44bd9e);
      transition: width 0.3s ease;
    }

    .progress-fill.warning {
      background: linear-gradient(90deg, #ffaa44, #ff8c00);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, #ff4444, #cc0000);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-reset {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    .btn-reset:hover {
      background: rgba(255,68,68,0.2);
      color: #ff6666;
    }

    .btn-reset:active {
      opacity: 0.7;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.active {
      background: #4ecdc4;
      box-shadow: 0 0 6px rgba(78,205,196,0.5);
    }

    .status-dot.inactive {
      background: #555;
    }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #666;
    }

    .log-section {
      margin-top: 10px;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
      color: #aaa;
    }

    .log-entry .log-val {
      color: #ccc;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .tag-night {
      background: rgba(255,170,68,0.15);
      color: #ffaa44;
    }

    .tag-day {
      background: rgba(78,205,196,0.15);
      color: #4ecdc4;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🦞</div>
    <h1>YouTube 监控</h1>
  </div>

  <div class="section">
    <div class="stat-row">
      <span class="stat-label">今日已用</span>
      <span class="stat-value" id="time-spent">加载中…</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="stat-row">
      <span class="stat-label">今日限制</span>
      <span class="stat-value" id="time-limit">加载中…</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">模式</span>
      <span id="mode-tag"></span>
    </div>

    <div class="stat-row">
      <span class="stat-label">当前标签页</span>
      <span id="status-label">
        <span class="status-dot inactive"></span>未在观看
      </span>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:4px;">
    <button class="btn btn-reset" id="btn-reset">
      ↺ 重置今日数据
    </button>
  </div>

  <div class="log-section">
    <div class="section-title">📊 最近 7 天</div>
    <div id="log-container"></div>
  </div>

  <div class="footer">
    <span id="footer-text">加载中…</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
