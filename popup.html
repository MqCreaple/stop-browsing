<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <title>别刷了！</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="header">
  <div class="header-icon">🦞</div>
  <h1>别刷了！</h1>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="monitor">📊 监控</button>
  <button class="tab-btn" data-tab="settings">⚙️ 设置</button>
</div>

<!-- === 监控页 === -->
<div class="tab-content active" id="tab-monitor">
  <div class="section">
    <div class="stat-row">
      <span class="stat-label"><span style="font-size:12px;">⏱</span> 本次使用</span>
      <span class="stat-value" id="time-spent">加载中…</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stat-row">
      <span class="stat-label">今日限制</span>
      <span class="stat-value" id="time-limit">加载中…</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">模式</span>
      <span id="mode-tag"></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">当前状态</span>
      <span id="status-label">
        <span class="status-dot inactive"></span>未知
      </span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">各站点使用时间</div>
    <div id="site-breakdown"></div>
  </div>

  <div style="display:flex;gap:8px;">
    <button class="btn btn-reset" id="btn-reset">↺ 重置今日</button>
  </div>

  <div class="section" style="margin-top:14px;">
    <div class="section-title">📊 最近 7 天</div>
    <div id="log-container"></div>
  </div>
</div>

<!-- === 设置页 === -->
<div class="tab-content" id="tab-settings">
  <div class="settings-scroll">
    <div class="section">
      <div class="section-title">🌐 监控站点</div>
      <div id="site-list"></div>
    </div>

    <div class="section">
      <div class="section-title">⏸ 暂停行为</div>
      <div id="pause-behaviour-list"></div>
      <div id="pause-behaviour-desc" style="font-size:12px;color:#666;margin-top:4px;"></div>
    </div>

    <div class="section">
      <div class="section-title">🌙 夜间时段</div>
      <div class="config-row">
        <label>起始</label>
        <input type="number" id="night-start" min="1" max="24" value="23">
        <span class="unit">:00</span>
        <span class="sep">→</span>
        <label>结束</label>
        <input type="number" id="night-end" min="0" max="23" value="6">
        <span class="unit">:00</span>
      </div>
      <div class="field-error" id="err-night-start">夜间起始应在 1～24（24=凌晨0点）之间</div>
      <div class="field-error" id="err-night-end">夜间结束应在 0～23 之间</div>
      <div style="font-size:11px;color:#555;margin-top:4px;">
        在此时段内将使用「夜间限制」
      </div>
    </div>

    <div class="section">
      <div class="section-title">⏱ 时间限制</div>
      <div class="config-row">
        <label>日间</label>
        <input type="number" id="day-limit" min="1" max="999" value="60">
        <span class="unit">分钟</span>
      </div>
      <div class="field-error" id="err-day-limit">日间限制应在 1～999 分钟之间</div>
      <div class="config-row">
        <label>夜间</label>
        <input type="number" id="night-limit" min="1" max="999" value="20">
        <span class="unit">分钟</span>
      </div>
      <div class="field-error" id="err-night-limit">夜间限制应在 1～999 分钟之间</div>
      <div class="config-row">
        <label>暂停时长</label>
        <input type="number" id="pause-duration" min="10" max="300" value="30">
        <span class="unit">秒</span>
      </div>
      <div class="field-error" id="err-pause-duration">暂停时长应在 10～300 秒之间</div>
      <div class="config-row">
        <label>暂停冷却</label>
        <input type="number" id="pause-cooldown" min="0" max="60" value="5">
        <span class="unit">分钟</span>
      </div>
      <div class="field-error" id="err-pause-cooldown">暂停冷却应在 0～60 分钟之间</div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-save" id="btn-save-cfg">✓ 保存设置</button>
      <button class="btn btn-default" id="btn-default-cfg">↺ 恢复默认</button>
    </div>
  </div>
</div>

<div class="footer">
  <span id="footer-text">加载中…</span>
  <span id="refresh-hint">每 5 秒自动刷新</span>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
